name: Release

on:
  push:
    branches: [master]

# One release run at a time.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version + changelog
    runs-on: ubuntu-latest
    # Don't react to commitizen's own bump commit (belt-and-suspenders: pushes
    # made with GITHUB_TOKEN don't trigger workflows anyway).
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    permissions:
      contents: write    # commit the bump + changelog back to master
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so commitizen can find the baseline and the
          # commits to analyze.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump the version (pyproject + src/__version__.py) and regenerate the
      # changelog from conventional commits. Exit codes 3/21 mean "no eligible
      # commits since the last release" — that's a no-op, not a failure.
      - name: Bump version and changelog
        id: bump
        run: |
          set +e
          uv run cz bump --yes --changelog
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 3 ] || [ "$code" -eq 21 ]; then
            echo "No eligible commits to bump — skipping release."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            exit "$code"
          fi

      - name: Push bump commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push --follow-tags origin HEAD:master
