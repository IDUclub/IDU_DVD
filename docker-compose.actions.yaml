# Production compose used by the deploy workflow (.github/workflows/build_and_deploy.yml) —
# the gMART docker-compose.actions.yaml pattern adapted for IDU_DVD. The app image is
# pre-built and passed via DVD_IMAGE. App config is layered (weakest to strongest):
# code defaults -> .env.production (copied from the runner's ENV_PATH) -> .env.overrides
# (non-empty DVD_* vars/secrets of the GitHub "production" environment; later env_file wins).
# Only the app runs here: Qdrant, Redis and MinIO are external services of the contour, so
# their addresses (DVD_QDRANT_URL / DVD_REDIS_URL / DVD_MINIO_*) must be present in one of the
# env files — Qdrant and MinIO are contacted at startup and their absence aborts the boot.
# The app's host port defaults to 8100 because gMART's idu_mcp already binds 8000 there.

services:
  idu_dvd:
    image: ${DVD_IMAGE}
    container_name: idu_dvd
    restart: always
    ports:
      - "${DVD_HOST_PORT:-8100}:8000"
    env_file:
      - ./.env.production
      - ./.env.overrides
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dvd_uploads:/app/_uploads

volumes:
  dvd_uploads:
